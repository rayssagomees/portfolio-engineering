<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="voice-of-customer-survey" style="background: var(--background-light); padding: 30px; border-radius: 8px; border: 2px dashed var(--secondary-color); text-align: center; margin-top: 40px;">
        <h3 style="color: var(--primary-color);">Só mais uma coisa...</h3>
        <p style="margin-bottom: 20px;">Para me ajudar a melhorar o meu atendimento, poderia partilhar:</p>
        <label for="objection" style="display: block; font-weight: bold; margin-bottom: 10px;">
            Qual foi o principal receio ou dúvida que quase te impediu de entrar em contacto comigo hoje?
        </label>
        <textarea id="objection" name="objection" rows="4" style="width: 100%; max-width: 500px; padding: 12px; border-radius: 4px; border: 1px solid #ccc;" placeholder="Ex: Fiquei na dúvida se atendia a minha região ou se o prazo seria muito longo..."></textarea>
        <br>
        <button type="submit" style="background-color: var(--secondary-color); color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold;">
            Enviar Feedback
        </button>
    </div>
</body>
</html>
